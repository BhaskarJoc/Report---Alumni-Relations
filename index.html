<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEHU · LinkedIn Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#eef1f6;
  --bg-elev:#ffffff;
  --bg-card:#ffffff;
  --bg-card-2:#f2f4f8;
  --line:rgba(16,28,51,0.09);
  --line-strong:rgba(16,28,51,0.16);
  --ink:#131c30;
  --ink-dim:#5b6472;
  --ink-faint:#8b93a3;
  --navy:#101c33;
  --navy-2:#182747;
  --maroon:#101c33;
  --maroon-light:#182747;
  --gold:#D6A72A;
  --gold-light:#E8C158;
  --linkedin:#0A66C2;
  --linkedin-light:#0A66C2;
  --success:#1E8A54;
  --danger:#C6423A;
  --radius:14px;
  --radius-sm:9px;
  font-size:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:
    radial-gradient(1100px 600px at 85% -10%, rgba(16,28,51,0.05), transparent 60%),
    radial-gradient(900px 500px at -5% 10%, rgba(214,167,42,0.06), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'IBM Plex Sans', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{ background:var(--gold); color:#1a1a1a; }
h1,h2,h3,.display{ font-family:'Fraunces', serif; }
.mono{ font-family:'IBM Plex Mono', monospace; }
a{ color:inherit; }
button{ font-family:inherit; cursor:pointer; }
::-webkit-scrollbar{ height:8px; width:8px; }
::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:6px; }
::-webkit-scrollbar-track{ background:transparent; }

/* ===== Layout shell ===== */
.app{ max-width:1400px; margin:0 auto; padding:0 22px 60px; }

/* ===== Header ===== */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 24px; gap:16px; flex-wrap:wrap;
  background:linear-gradient(155deg, var(--navy-2) 0%, var(--navy) 100%);
  border-radius:14px; margin-top:18px;
  box-shadow:0 8px 24px rgba(16,28,51,0.18);
}
.brand{ display:flex; align-items:center; gap:14px; }
.brand-mark{
  width:46px; height:46px; border-radius:11px;
  background:linear-gradient(155deg, var(--gold) 0%, #a9821c 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-weight:700; font-size:20px; color:var(--navy);
  border:1px solid rgba(255,255,255,0.25);
  flex-shrink:0;
}
.brand-text h1{ font-size:22px; font-weight:600; letter-spacing:0.2px; line-height:1.15; color:#fff;}
.brand-text .sub{ font-size:12.5px; color:rgba(255,255,255,0.65); letter-spacing:0.4px; text-transform:uppercase; margin-top:2px; display:flex; align-items:center; gap:7px;}
.topbar .btn{ border-color:rgba(255,255,255,0.28); background:transparent; color:#fff; }
.topbar .btn:hover{ border-color:var(--gold); background:rgba(255,255,255,0.08); }
.topbar .btn-gold{ background:linear-gradient(155deg, var(--gold) 0%, #a9821c 100%); color:var(--navy); border:none; }
.topbar .admin-badge{ background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.25); }
.btn-light{ background:#fff; color:var(--navy); border:1.5px solid #fff; font-weight:600; }
.btn-light:hover{ background:#f0f2f5; transform:translateY(-1px); }
.btn-navy-solid{ background:var(--navy); color:#fff; border:1px solid rgba(255,255,255,0.15); font-weight:600; }
.btn-navy-solid:hover{ filter:brightness(1.25); }
.pulse{
  width:8px; height:8px; border-radius:50%; background:var(--success); position:relative; flex-shrink:0;
  box-shadow:0 0 0 0 rgba(63,174,106,0.6);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{ box-shadow:0 0 0 0 rgba(63,174,106,0.55);}
  70%{ box-shadow:0 0 0 7px rgba(63,174,106,0);}
  100%{ box-shadow:0 0 0 0 rgba(63,174,106,0);}
}
.top-actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.btn{
  border:1px solid var(--line-strong); background:var(--bg-card); color:var(--ink);
  padding:10px 16px; border-radius:10px; font-size:13.5px; font-weight:500;
  display:inline-flex; align-items:center; gap:7px; transition:all .15s ease; white-space:nowrap;
}
.btn:hover{ border-color:var(--gold); background:var(--bg-card-2); transform:translateY(-1px); }
.btn-gold{ background:linear-gradient(155deg, var(--gold) 0%, #a9821c 100%); color:#1c1608; border:none; font-weight:600;}
.btn-gold:hover{ filter:brightness(1.08); }
.btn-maroon{ background:linear-gradient(155deg, var(--maroon-light) 0%, var(--maroon) 100%); color:#fff; border:none; font-weight:600;}
.btn-maroon:hover{ filter:brightness(1.1); }
.btn-ghost{ background:transparent; }
.btn-sm{ padding:6px 11px; font-size:12px; border-radius:8px;}
.btn-danger{ color:var(--danger); border-color:rgba(214,82,74,0.4); }
.btn-danger:hover{ border-color:var(--danger); background:rgba(214,82,74,0.08); }
.admin-badge{
  font-size:11px; padding:6px 10px; border-radius:20px; background:rgba(63,174,106,0.12); color:var(--success);
  border:1px solid rgba(63,174,106,0.35); font-weight:600; letter-spacing:.3px; display:flex; align-items:center; gap:6px;
}

/* ===== Search + Notifications ===== */
#searchBoxWrap input{
  border:1px solid rgba(255,255,255,0.28); background:rgba(255,255,255,0.08); color:#fff;
  padding:9px 12px; border-radius:9px; font-size:13px;
}
#searchBoxWrap input::placeholder{ color:rgba(255,255,255,0.55); }
.btn.icon-only{ padding:9px 12px; position:relative; }
.notif-dot{
  position:absolute; top:-5px; right:-5px; background:var(--danger); color:#fff; font-size:10px; font-weight:700;
  border-radius:50%; min-width:16px; height:16px; display:flex; align-items:center; justify-content:center; padding:0 3px;
}
.dropdown-panel{
  position:absolute; top:calc(100% + 8px); right:0; width:320px; max-height:380px; overflow:auto; z-index:60;
  background:var(--bg-elev); border:1px solid var(--line-strong); border-radius:12px; box-shadow:0 14px 34px rgba(16,28,51,0.22);
  padding:6px; text-align:left;
}
.dropdown-head{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-dim); padding:8px 10px; display:flex; align-items:center; gap:8px;}
.dropdown-item{ padding:9px 10px; border-radius:8px; font-size:13px; color:var(--ink); cursor:default; display:flex; align-items:flex-start; gap:8px; }
.dropdown-item.search-result{ cursor:pointer; }
.dropdown-item.search-result:hover{ background:var(--bg-card-2); }
.dot{ width:7px; height:7px; border-radius:50%; margin-top:6px; flex-shrink:0; }
.dot-danger{ background:var(--danger); }
.dot-flat{ background:var(--ink-faint); }

/* ===== Achievements & metrics ===== */
.metric-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:8px; margin:10px 0; }
.metric-chip{ background:var(--bg-card-2); border-radius:8px; padding:8px 10px; text-align:center; }
.metric-chip .v{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; color:var(--navy); }
.metric-chip .l{ font-size:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.3px; margin-top:2px; }
.score-badge{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; }
.score-high{ background:rgba(30,138,84,0.12); color:var(--success); }
.score-mid{ background:rgba(214,167,42,0.15); color:#8a6a10; }
.score-low{ background:rgba(198,66,58,0.12); color:var(--danger); }
.achv-item{ border-left:3px solid var(--gold); padding:6px 10px; margin-top:6px; background:var(--bg-card-2); border-radius:0 8px 8px 0; }
.achv-item .achv-type{ font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--gold); font-weight:700; }
.achv-item .achv-title{ font-size:13px; font-weight:600; margin-top:1px; }
.achv-item .achv-date{ font-size:11px; color:var(--ink-faint); }
.stars{ color:var(--gold); letter-spacing:1px; }
.insight-box{ background:linear-gradient(155deg, var(--bg-card-2) 0%, var(--bg-card) 100%); border:1px dashed var(--line-strong); border-radius:12px; padding:16px; font-size:13.5px; line-height:1.6; color:var(--ink-dim); }
.insight-box b{ color:var(--ink); }
.checkbox-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
.checkbox-row{ display:flex; align-items:center; gap:8px; font-size:13.5px; background:var(--bg-card-2); padding:8px 10px; border-radius:8px; }

/* ===== Winner ticker ===== */
.ticker-wrap{
  margin-top:14px; border:1px solid rgba(16,28,51,0.15); border-radius:12px; overflow:hidden;
  display:flex; align-items:stretch; box-shadow:0 6px 16px rgba(16,28,51,0.08);
}
.ticker-winner{
  flex:0 0 auto; display:flex; align-items:center; gap:11px; padding:11px 20px;
  background:linear-gradient(155deg, var(--gold-light) 0%, var(--gold) 60%, #c99b26 100%);
  color:var(--navy); white-space:nowrap; position:relative; max-width:min(46%,420px);
}
.ticker-winner::after{
  content:''; position:absolute; right:-14px; top:0; bottom:0; width:14px; z-index:2;
  background:linear-gradient(90deg, rgba(201,155,38,0.9), transparent);
}
.ticker-winner .tw-icon{ font-size:22px; flex-shrink:0; }
.ticker-winner .tw-text{ min-width:0; }
.ticker-winner .tw-label{ font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; opacity:.72; }
.ticker-winner .tw-name{ font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ticker-winner .tw-val{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; opacity:.85; }
.ticker-scroll{ flex:1 1 auto; overflow:hidden; position:relative; background:var(--bg-card-2); min-width:0; }
.ticker-track{
  display:flex; white-space:nowrap; padding:12px 0;
  animation:ticker 30s linear infinite;
  width:max-content;
}
.ticker-wrap:hover .ticker-track{ animation-play-state:paused; }
@keyframes ticker{ 0%{ transform:translateX(0);} 100%{ transform:translateX(-50%);} }
.ticker-item{ display:inline-flex; align-items:center; gap:8px; padding:0 24px; font-size:13px; font-weight:600; color:var(--ink); border-right:1px solid var(--line); }
.ticker-item b{ color:var(--navy); font-weight:700;}
.ticker-item .up{ color:#0d7a45; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:700;}
.ticker-item.pending{ color:var(--danger); }
.ticker-item.pending b{ color:var(--danger); }
@media (max-width:640px){
  .ticker-wrap{ flex-direction:column; }
  .ticker-winner{ max-width:none; }
  .ticker-winner::after{ display:none; }
}

/* ===== Tabs ===== */
.tabs{
  display:flex; gap:6px; margin-top:20px; overflow-x:auto; padding-bottom:4px;
  border-bottom:1px solid var(--line);
}
.tab-btn{
  background:transparent; border:none; color:var(--ink-dim); padding:11px 16px; font-size:13.5px; font-weight:500;
  border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s;
}
.tab-btn:hover{ color:var(--ink); }
.tab-btn.active{ color:var(--navy); font-weight:700; border-bottom-color:var(--gold); }

/* ===== Filters row ===== */
.filters{ display:flex; gap:10px; margin:18px 0; flex-wrap:wrap; align-items:center; }
.filters select, .filters input{
  background:var(--bg-card); border:1px solid var(--line-strong); color:var(--ink);
  padding:9px 12px; border-radius:9px; font-size:13px; font-family:inherit;
}
.filters input[type="text"]{ min-width:220px; }
.filters select:focus, .filters input:focus{ outline:none; border-color:var(--gold); }

/* ===== KPI cards ===== */
.kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:14px; margin:18px 0 26px; }
.kpi-card{
  background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px;
  position:relative; overflow:hidden;
}
.kpi-card::before{
  content:''; position:absolute; top:0; left:0; width:100%; height:3px;
  background:linear-gradient(90deg, var(--gold), var(--maroon));
}
.kpi-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:0.6px; color:var(--ink-dim); font-weight:600;}
.kpi-value{ font-family:'Fraunces',serif; font-size:32px; font-weight:600; margin-top:6px; line-height:1;}
.kpi-delta{ font-size:12.5px; margin-top:8px; font-family:'IBM Plex Mono',monospace; display:flex; align-items:center; gap:5px;}
.kpi-delta.pos{ color:var(--success); }
.kpi-delta.neg{ color:var(--danger); }
.kpi-delta.flat{ color:var(--ink-faint); }

/* ===== Section card ===== */
.card{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:20px; margin-bottom:20px;}
.card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
.card-head h2{ font-size:18px; font-weight:600; }
.card-head .hint{ font-size:12px; color:var(--ink-dim); }

/* ===== Table ===== */
.table-wrap{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; font-size:13.5px; }
thead th{
  text-align:left; padding:10px 12px; color:var(--ink-dim); font-weight:600; font-size:11.5px;
  text-transform:uppercase; letter-spacing:0.4px; border-bottom:1px solid var(--line-strong); white-space:nowrap;
}
tbody td{ padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
tbody tr:hover{ background:rgba(255,255,255,0.02); }
.num{ font-family:'IBM Plex Mono',monospace; }
.tag{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
.tag-live{ background:rgba(63,174,106,0.12); color:var(--success); border:1px solid rgba(63,174,106,0.3);}
.tag-none{ background:rgba(155,152,166,0.1); color:var(--ink-dim); border:1px solid var(--line-strong);}
.tag-warn{ background:rgba(214,167,42,0.14); color:#8a6a10; border:1px solid rgba(214,167,42,0.4);}
.tag-danger{ background:rgba(198,66,58,0.1); color:var(--danger); border:1px solid rgba(198,66,58,0.32);}

/* ===== Alerts panel ===== */
.alert-panel{ display:flex; flex-direction:column; gap:8px; }
.alert-item{ display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; background:var(--bg-card-2); border-left:3px solid var(--danger); font-size:13px; }
.alert-item.warn{ border-left-color:var(--gold); }
.alert-item .alert-icon{ font-size:15px; line-height:1.4; }
.alert-item .alert-text b{ color:var(--ink); }
.alert-item .alert-sub{ font-size:11.5px; color:var(--ink-faint); margin-top:2px; }

/* ===== Achievement attachments / chips ===== */
.attach-chip{ display:inline-flex; align-items:center; gap:5px; font-size:11px; background:var(--bg-card); border:1px solid var(--line-strong); border-radius:20px; padding:3px 9px; margin:3px 4px 0 0; }
.attach-chip a{ color:var(--linkedin); text-decoration:none; }
.pending-chip-row{ display:flex; flex-wrap:wrap; margin-top:4px; }

/* ===== Report builder radio groups ===== */
.radio-row{ display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 4px; }
.radio-row label{ display:flex; align-items:center; gap:6px; font-size:13px; background:var(--bg-card-2); padding:7px 12px; border-radius:20px; cursor:pointer; }
.rank-pill{
  width:26px; height:26px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; background:var(--bg-card-2); color:var(--ink-dim);
  border:1px solid var(--line-strong);
}
.rank-pill.r1{ background:linear-gradient(155deg,var(--gold),#a9821c); color:#1c1608; border:none;}
.rank-pill.r2{ background:#8f97a3; color:#1c1608; border:none;}
.rank-pill.r3{ background:#a5673a; color:#fff; border:none;}
.row-actions{ display:flex; gap:6px; }
.icon-btn{
  background:transparent; border:1px solid var(--line-strong); color:var(--ink-dim); width:28px; height:28px;
  border-radius:7px; display:inline-flex; align-items:center; justify-content:center; font-size:13px;
}
.icon-btn:hover{ color:var(--ink); border-color:var(--gold); }

/* ===== Leaderboard bars ===== */
.lb-row{
  display:grid; grid-template-columns:34px minmax(110px,180px) 1fr auto; align-items:center; gap:16px;
  padding:11px 10px; border-radius:10px; transition:background .15s ease;
}
.lb-row:hover{ background:var(--bg-card-2); }
.lb-row + .lb-row{ border-top:1px solid var(--line); }
.lb-name{ font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-bar-track{
  position:relative; height:10px; background:var(--bg-card-2); border-radius:6px; overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(16,28,51,0.06);
}
.lb-bar-fill{
  height:100%; border-radius:6px; background:linear-gradient(90deg,var(--maroon) 0%, var(--maroon-light) 55%, var(--gold) 100%);
  width:0%; transition:width .8s cubic-bezier(.22,.9,.3,1);
  box-shadow:0 0 8px rgba(214,167,42,0.35);
}
.lb-row:nth-child(1) .lb-bar-fill{ background:linear-gradient(90deg,var(--gold-light),var(--gold)); box-shadow:0 0 10px rgba(214,167,42,0.55); }
.lb-val{
  text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13.5px; font-weight:700; color:var(--navy);
  min-width:70px;
}
@media (max-width:560px){
  .lb-row{ grid-template-columns:26px 1fr auto; row-gap:6px; }
  .lb-bar-track{ grid-column:1 / -1; order:3; }
}

/* ===== Grid cards (sessions/chapters/coordinators) ===== */
.grid-cards{ display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr)); gap:14px; }
.mini-card{ background:var(--bg-card-2); border:1px solid var(--line); border-radius:12px; padding:15px 16px; }
.mini-card h3{ font-size:14.5px; font-weight:600; font-family:'IBM Plex Sans',sans-serif; }
.mini-card .meta{ font-size:12px; color:var(--ink-dim); margin-top:4px; line-height:1.6;}
.mini-card .row-actions{ margin-top:10px; }
.avatar-photo{ width:100%; height:120px; border-radius:8px; object-fit:cover; margin-bottom:10px; background:var(--bg-elev); }
.li-link{ color:var(--linkedin-light); font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:5px; margin-top:6px;}

/* ===== Empty state ===== */
.empty{ text-align:center; padding:40px 20px; color:var(--ink-dim); }
.empty .big{ font-size:32px; margin-bottom:8px; }

/* ===== Modal ===== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(8,8,10,0.72); backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal{
  background:var(--bg-elev); border:1px solid var(--line-strong); border-radius:16px; width:100%; max-width:560px;
  max-height:88vh; overflow-y:auto; padding:26px;
}
.modal h2{ font-size:19px; margin-bottom:4px; }
.modal .sub{ font-size:12.5px; color:var(--ink-dim); margin-bottom:18px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12px; color:var(--ink-dim); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px;}
.field input, .field select, .field textarea{
  width:100%; background:var(--bg-card); border:1px solid var(--line-strong); color:var(--ink);
  padding:10px 12px; border-radius:9px; font-size:13.5px; font-family:inherit;
}
.field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--gold); }
.field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.hd-msec-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin:4px 0 16px; padding-bottom:10px; border-bottom:1px solid var(--line); }
.hd-msec-btn{ background:var(--bg-card-2); border:1px solid var(--line-strong); color:var(--ink-dim); padding:7px 13px; border-radius:20px; font-size:11.5px; font-weight:600; white-space:nowrap; }
.hd-msec-btn:hover{ color:var(--ink); border-color:var(--gold); }
.hd-msec-btn.active{ background:var(--navy); color:#fff; border-color:var(--navy); }

}
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }

// Canonicalizes any month value (Date object, Excel serial number, "2026-1",
// "2026-01-15", etc.) to a clean "YYYY-MM" string so the same calendar month
// always groups together instead of splintering into near-duplicate entries.
function normalizeMonth(val){
  if(val===null || val===undefined || val==='') return '';
  if(val instanceof Date && !isNaN(val.getTime())){
    return val.getFullYear()+'-'+String(val.getMonth()+1).padStart(2,'0');
  }
  if(typeof val === 'number' && isFinite(val)){
    // Excel serial date (days since 1899-12-30)
    const d = new Date(Math.round((val-25569)*86400*1000));
    if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }
  const s = String(val).trim();
  const m = s.match(/^(\d{4})[-\/](\d{1,2})/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0');
  const d2 = new Date(s);
  if(!isNaN(d2.getTime())) return d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0');
  return s;
}
function normalizeRecordMonths(records){
  (records||[]).forEach(r=>{ r.month = normalizeMonth(r.month); });
  return records;

   Contract expected on the Apps Script side:
     GET  ?action=read                -> {records:[],sessions:[],chapters:[],coordinators:[],alumniWapp:[]}
     POST body (text/plain, JSON string) -> {action:'save', pin:'...', data:{records,sessions,chapters,coordinators,alumniWapp}}
   The app works fully offline against in-memory demo data if the backend
   contract differs or is unreachable — connect your own Apps Script deployment
   matching this contract to enable live cross-user sync.
========================================================================= */
async function pullFromBackend(){
  if(!SCRIPT_URL) return false;
  try{
    STATE.syncing = true; renderSyncState();
    const res = await fetch(SCRIPT_URL+"?action=read", {method:"GET"});
    if(!res.ok) throw new Error("bad response");

      STATE.records = data.records || STATE.records;
      normalizeRecordMonths(STATE.records);
      STATE.sessions = data.sessions || STATE.sessions;
      STATE.chapters = data.chapters || STATE.chapters;
      STATE.coordinators = data.coordinators || STATE.coordinators;
      STATE.notifLog = data.notifLog || STATE.notifLog;
      STATE.alumniWapp = data.alumniWapp || STATE.alumniWapp;
      STATE.helpdesk = data.helpdesk || STATE.helpdesk;
      STATE.lastSync = new Date();
      return true;
    }
    return false;
  }catch(e){
    console.warn("Backend sync unavailable, using local/demo data:", e.message);
    return false;
  }finally{
    STATE.syncing = false; renderSyncState();
  }
}

async function pushToBackend(){
  if(!SCRIPT_URL) return false;
  try{
    const payload = {
      action:"save", pin: ADMIN_PIN,
      data:{records:STATE.records, sessions:STATE.sessions, chapters:STATE.chapters, coordinators:STATE.coordinators, notifLog:STATE.notifLog, alumniWapp:STATE.alumniWapp, helpdesk:STATE.helpdesk}

    return false;

}

/* =========================================================================
   DERIVED DATA HELPERS
========================================================================= */
function monthsAvailable(){
  const s = new Set(STATE.records.map(r=>r.month));
  STATE.coordinators.forEach(c=> (c.metricsHistory||[]).forEach(h=> h.month && s.add(h.month)));
  s.add(STATE.month);
  return Array.from(s).sort();
}
// Academic year runs July -> June, labelled e.g. "2025-26"
function academicYearOf(monthStr){
  const [y,m] = String(monthStr).split('-').map(Number);
  if(!y||!m) return '';
  return m>=7 ? `${y}-${String(y+1).slice(2)}` : `${y-1}-${String(y).slice(2)}`;
}
function academicYearsAvailable(){
  const s = new Set(monthsAvailable().map(academicYearOf).filter(Boolean));
  return Array.from(s).sort();
}
function monthsInAcademicYear(ay){
  return monthsAvailable().filter(m=>academicYearOf(m)===ay);
}
function quarterMonths(ay, q){
  const y1 = Number(String(ay).split('-')[0]);
  if(!y1) return [];
  const ranges = {
    Q1:[[y1,7],[y1,8],[y1,9]],
    Q2:[[y1,10],[y1,11],[y1,12]],
    Q3:[[y1+1,1],[y1+1,2],[y1+1,3]],
    Q4:[[y1+1,4],[y1+1,5],[y1+1,6]],
  };
  return (ranges[q]||[]).map(([y,m])=> y+'-'+String(m).padStart(2,'0')).filter(m=>monthsAvailable().includes(m));
}
function recordsForMonth(month, campus){
  return STATE.records.filter(r=> r.month===month && (campus==='All'||!campus || r.campus===campus));
}
function growthFor(rec){
  const prevM = prevMonthStr(rec.month);
  const prev = STATE.records.find(r=>r.month===prevM && r.campus===rec.campus && r.department===rec.department && r.course===rec.course);
  if(!prev) return null;
  return rec.followers - prev.followers;
}
function campusTotals(month){
  const list = recordsForMonth(month,'All');
  const map = {};
  CAMPUSES.forEach(c=> map[c] = {campus:c, followers:0, connections:0, posts:0, spotlights:0});
  list.forEach(r=>{
    if(!map[r.campus]) map[r.campus] = {campus:r.campus, followers:0, connections:0, posts:0, spotlights:0};
    map[r.campus].followers += Number(r.followers)||0;
    map[r.campus].connections += Number(r.connections)||0;
    map[r.campus].posts += Number(r.posts)||0;
    map[r.campus].spotlights += Number(r.spotlights)||0;
  });
  return Object.values(map).sort((a,b)=>b.followers-a.followers);
}
function deptTotals(month, campus){
  const list = recordsForMonth(month, campus);
  const map = {};
  list.forEach(r=>{
    const key = r.department;
    if(!map[key]) map[key] = {department:key, followers:0, connections:0, posts:0, spotlights:0};
    map[key].followers += Number(r.followers)||0;
    map[key].connections += Number(r.connections)||0;
    map[key].posts += Number(r.posts)||0;
    map[key].spotlights += Number(r.spotlights)||0;
  });
  return Object.values(map).sort((a,b)=>b.followers-a.followers);
}
function deptTotalsByCampus(month, campus){
  const list = recordsForMonth(month, campus);
  const map = {};
  list.forEach(r=>{
    const key = r.department+'|||'+r.campus;
    if(!map[key]) map[key] = {department:r.department, campus:r.campus, followers:0, connections:0, posts:0, spotlights:0};
    map[key].followers += Number(r.followers)||0;
    map[key].connections += Number(r.connections)||0;
    map[key].posts += Number(r.posts)||0;
    map[key].spotlights += Number(r.spotlights)||0;
  });
  return Object.values(map).sort((a,b)=> a.department===b.department ? b.followers-a.followers : a.department.localeCompare(b.department));
}
function totalKpis(month){
  const list = recordsForMonth(month,'All');
  const prevList = recordsForMonth(prevMonthStr(month),'All');
  const followers = list.reduce((a,r)=>a+(Number(r.followers)||0),0);
  const connections = list.reduce((a,r)=>a+(Number(r.connections)||0),0);
  const posts = list.reduce((a,r)=>a+(Number(r.posts)||0),0);
  const spotlights = list.reduce((a,r)=>a+(Number(r.spotlights)||0),0);
  const prevFollowers = prevList.reduce((a,r)=>a+(Number(r.followers)||0),0);
  const growth = prevList.length ? followers - prevFollowers : null;
  const pagesLive = list.filter(r=>r.hasPage!==false).length;
  return {followers, connections, posts, spotlights, growth, pagesLive, total:list.length};
}
function topPerformers(){
  const month = STATE.month;
  const cts = campusTotals(month).filter(c=>c.followers>0);
  const dts = deptTotals(month,'All').filter(d=>d.followers>0);
  const items = [];
  if(cts[0]) items.push({label:`${cts[0].campus} Campus`, val:cts[0].followers, kind:'campus'});
  if(dts[0]) items.push({label:`${dts[0].department} Dept.`, val:dts[0].followers, kind:'dept'});
  STATE.records.filter(r=>r.month===month).forEach(r=>{
    const g = growthFor(r);
    if(g!==null && g>0) items.push({label:`${r.campus} · ${r.department}`, val:g, kind:'growth'});
  });
  return items.sort((a,b)=>b.val-a.val).slice(0,8);
}

/* =========================================================================
   COORDINATOR ENGAGEMENT SCORE
========================================================================= */
function coordMetricsForMonth(c, month){
  const h = (c.metricsHistory||[]).find(x=>x.month===month);
  return h || {sessionsOrganized:0, linkedinPosts:0, alumniOnboarded:0, eventsCoordinated:0, responseRate:0};
}
function coordEngagementScore(c, month){
  const m = coordMetricsForMonth(c, month || STATE.month);
  const sessions = Number(m.sessionsOrganized)||0;
  const posts = Number(m.linkedinPosts)||0;
  const onboarded = Number(m.alumniOnboarded)||0;
  const events = Number(m.eventsCoordinated)||0;
  const response = Number(m.responseRate)||0;
  // Weighted composite, capped at 100 — a simple transparent formula, not a black box.
  const raw = (sessions*3) + (posts*1.5) + (onboarded*0.8) + (events*2.5) + (response*0.4);
  return Math.max(0, Math.min(100, Math.round(raw / 2)));
}

/* =========================================================================
   ALUMNI SESSION FEEDBACK ANALYTICS
========================================================================= */
function allFeedbackEntries(){
  const out = [];
  STATE.sessions.forEach(s=>{ (s.feedbackEntries||[]).forEach(f=> out.push({...f, sessionId:s.id, sessionTopic:s.topic, speakerName:s.speaker, date:s.date, department:f.department||s.department})); });
  return out;
}
function avg(arr, key){ const v = arr.map(x=>Number(x[key])||0).filter(n=>!isNaN(n)); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; }
function feedbackSummary(){
  const entries = allFeedbackEntries();
  const overall = avg(entries,'overall');
  const speaker = avg(entries,'speaker');
  const content = avg(entries,'content');
  const interaction = avg(entries,'interaction');
  const relevance = avg(entries,'relevance');
  const recommendPct = entries.length? Math.round((entries.filter(e=>e.recommend).length/entries.length)*100) : null;
  const byDept = {};
  entries.forEach(e=>{ (byDept[e.department]=byDept[e.department]||[]).push(e); });
  const deptAverages = Object.keys(byDept).map(d=>({department:d, avg:avg(byDept[d],'overall'), count:byDept[d].length})).sort((a,b)=>b.avg-a.avg);
  const bySpeaker = {};
  entries.forEach(e=>{ (bySpeaker[e.speakerName]=bySpeaker[e.speakerName]||[]).push(e); });
  const speakerAverages = Object.keys(bySpeaker).map(s=>({speaker:s, avg:avg(bySpeaker[s],'overall'), count:bySpeaker[s].length})).sort((a,b)=>b.avg-a.avg);
  const bySession = {};
  entries.forEach(e=>{ (bySession[e.sessionId]=bySession[e.sessionId]||{topic:e.sessionTopic, speaker:e.speakerName, entries:[]}).entries.push(e); });
  const sessionAverages = Object.keys(bySession).map(id=>({ id, topic:bySession[id].topic, speaker:bySession[id].speaker, avg:avg(bySession[id].entries,'overall'), count:bySession[id].entries.length}));
  const best = sessionAverages.slice().sort((a,b)=>b.avg-a.avg).slice(0,5);
  const worst = sessionAverages.slice().sort((a,b)=>a.avg-b.avg).slice(0,5);
  const monthly = {};
  entries.forEach(e=>{ const m = normalizeMonth((e.date||'').slice(0,7)) || (e.date||'').slice(0,7); (monthly[m]=monthly[m]||[]).push(e); });
  const monthlyTrend = Object.keys(monthly).sort().map(m=>({month:m, avg:avg(monthly[m],'overall'), count:monthly[m].length}));
  const heldSessions = STATE.sessions.filter(s=>s.status==='Held');
  const totalAttendance = heldSessions.reduce((a,s)=>a+(Number(s.attendance)||0),0);
  const participationRate = heldSessions.length? Math.round((entries.length / Math.max(totalAttendance,entries.length||1)) * 100) : null;
  return {entries, overall, speaker, content, interaction, relevance, recommendPct, deptAverages, speakerAverages, sessionAverages, best, worst, monthlyTrend, participationRate};
}
function feedbackInsightSummary(){
  const f = feedbackSummary();
  if(!f.entries.length) return "No session feedback has been collected yet — once alumni sessions receive ratings, this panel will auto-generate strengths, gaps, and sentiment trends from the data.";
  const parts = [];
  const fmt = n=> n===null? '—' : n.toFixed(1);
  parts.push(`Across ${f.entries.length} feedback response(s), the overall session rating averages ${fmt(f.overall)}/5, with speaker delivery at ${fmt(f.speaker)}/5 and content quality at ${fmt(f.content)}/5.`);
  if(f.deptAverages.length){
    const top = f.deptAverages[0], low = f.deptAverages[f.deptAverages.length-1];
    if(top && top.department!==low.department) parts.push(`${top.department} students report the highest satisfaction (${fmt(top.avg)}/5), while ${low.department} trails at ${fmt(low.avg)}/5 — a possible area to target with more relevant speaker topics.`);
  }
  if(f.recommendPct!==null) parts.push(`${f.recommendPct}% of respondents said they would recommend the session to peers, indicating ${f.recommendPct>=75?'strong':(f.recommendPct>=50?'moderate':'weak')} advocacy sentiment.`);
  if(f.interaction!==null && f.interaction < 3.5) parts.push(`Interaction level (${fmt(f.interaction)}/5) is a relative weak point — consider building in more live Q&A or breakout time.`);
  else if(f.interaction!==null) parts.push(`Interaction levels (${fmt(f.interaction)}/5) suggest students are engaging actively during sessions.`);
  if(f.best.length) parts.push(`Best-received session: "${f.best[0].topic}" by ${f.best[0].speaker} (${fmt(f.best[0].avg)}/5).`);
  if(f.worst.length && f.worst[0].avg < (f.overall||5)) parts.push(`Lowest-rated: "${f.worst[0].topic}" by ${f.worst[0].speaker} (${fmt(f.worst[0].avg)}/5) — worth a follow-up review.`);
  return parts.join(' ');
}

/* =========================================================================
   WHATSAPP CHAPTER ANALYTICS
========================================================================= */
function chapterAnalytics(){
  const chapters = STATE.chapters;
  const totalChapters = chapters.length;
  const totalMembers = chapters.reduce((a,c)=>a+(Number(c.activeMembers)||0),0);
  const inactiveMembers = chapters.reduce((a,c)=>a+(Number(c.inactiveMembers)||0),0);
  const pendingInvites = chapters.reduce((a,c)=>a+(Number(c.pendingInvites)||0),0);
  const inactiveChapters = chapters.filter(c=>c.active===false).length;
  const admins = chapters.filter(c=>c.admin).map(c=>({name:c.admin, phone:c.adminPhone||'', chapter:c.region, campus:c.campus, chapterActive:c.active!==false}));
  const activeAdmins = new Set(admins.map(a=>a.name)).size;
  const chaptersMissingAdmin = chapters.filter(c=>!c.admin);
  const byCampus = {}; chapters.forEach(c=>{ (byCampus[c.campus]=byCampus[c.campus]||[]).push(c); });
  const campusBreakdown = Object.keys(byCampus).map(k=>({campus:k, chapters:byCampus[k].length, members:byCampus[k].reduce((a,c)=>a+(Number(c.activeMembers)||0),0)}));
  const byDept = {}; chapters.forEach(c=>{ const d=c.department||'Unassigned'; (byDept[d]=byDept[d]||[]).push(c); });
  const deptBreakdown = Object.keys(byDept).map(k=>({department:k, chapters:byDept[k].length, members:byDept[k].reduce((a,c)=>a+(Number(c.activeMembers)||0),0)}));
  const allHistory = [];
  chapters.forEach(c=>{ (c.history||[]).forEach(h=> allHistory.push({...h, chapter:c.region, campus:c.campus})); });
  allHistory.sort((a,b)=> new Date(b.date)-new Date(a.date));
  const monthlyJoins = {}, monthlyExits = {};
  allHistory.forEach(h=>{ const m = normalizeMonth((h.date||'').slice(0,7)); if(h.type==='join') monthlyJoins[m]=(monthlyJoins[m]||0)+(Number(h.count)||0); else monthlyExits[m]=(monthlyExits[m]||0)+(Number(h.count)||0); });
  const months = Array.from(new Set([...Object.keys(monthlyJoins), ...Object.keys(monthlyExits)])).sort();
  const monthlyTrend = months.map(m=>({month:m, joins:monthlyJoins[m]||0, exits:monthlyExits[m]||0, net:(monthlyJoins[m]||0)-(monthlyExits[m]||0)}));
  const annualJoins = {}, annualExits = {};
  allHistory.forEach(h=>{ const ay = academicYearOf(normalizeMonth((h.date||'').slice(0,7))); if(!ay) return; if(h.type==='join') annualJoins[ay]=(annualJoins[ay]||0)+(Number(h.count)||0); else annualExits[ay]=(annualExits[ay]||0)+(Number(h.count)||0); });
  const annualYears = Array.from(new Set([...Object.keys(annualJoins), ...Object.keys(annualExits)])).sort();
  const annualTrend = annualYears.map(ay=>({year:ay, joins:annualJoins[ay]||0, exits:annualExits[ay]||0, net:(annualJoins[ay]||0)-(annualExits[ay]||0)}));
  const newAlumniTotal = allHistory.filter(h=>h.type==='join').reduce((a,h)=>a+(Number(h.count)||0),0);
  const exitedTotal = allHistory.filter(h=>h.type==='exit').reduce((a,h)=>a+(Number(h.count)||0),0);

  // Alerts & notifications
  const alerts = [];
  chapters.forEach(c=>{
    if(!c.department) alerts.push({level:'warn', icon:'🏷️', text:`Missing department information for "${c.region}" chapter.`, sub:`${c.campus}`});
    if(!c.campus) alerts.push({level:'danger', icon:'📍', text:`Missing campus information for "${c.region}" chapter.`, sub:''});
  });
  chaptersMissingAdmin.forEach(c=> alerts.push({level:'danger', icon:'🧑\u200d💼', text:`"${c.region}" chapter has no administrator assigned.`, sub:`${c.campus}${c.department?' · '+c.department:''} — requires attention`}));
  chapters.filter(c=>c.admin && c.active===false).forEach(c=> alerts.push({level:'warn', icon:'⚠️', text:`"${c.region}" chapter is inactive despite having an administrator (${c.admin}).`, sub:`${c.campus} — consider re-engagement`}));
  chapters.filter(c=> (Number(c.inactiveMembers)||0) > 0 && (Number(c.inactiveMembers)||0) >= (Number(c.activeMembers)||0)*0.3).forEach(c=> alerts.push({level:'warn', icon:'📉', text:`"${c.region}" chapter has a high share of inactive members (${c.inactiveMembers}).`, sub:`${c.campus} — administrator attention recommended`}));

  return {totalChapters, totalMembers, inactiveMembers, pendingInvites, inactiveChapters, activeAdmins, admins, chaptersMissingAdmin,
    campusBreakdown, deptBreakdown, allHistory, monthlyTrend, annualTrend, newAlumniTotal, exitedTotal, alerts};
}

/* =========================================================================
   REPORT-SCOPED AGGREGATION (campus / department / multi-month filtering
   used by the customizable PDF report builder)
========================================================================= */
function reportCampusTotals(months, department){
  const sortedMonths = (months||[]).slice().sort();
  const lastM = sortedMonths[sortedMonths.length-1];
  const snapshotRecs = STATE.records.filter(r=> r.month===lastM && (department==='All'||!department||r.department===department));
  const flowRecs = STATE.records.filter(r=> sortedMonths.includes(r.month) && (department==='All'||!department||r.department===department));
  const map = {};
  CAMPUSES.forEach(c=> map[c] = {campus:c, followers:0, connections:0, posts:0, spotlights:0});
  snapshotRecs.forEach(r=>{ if(!map[r.campus]) map[r.campus]={campus:r.campus,followers:0,connections:0,posts:0,spotlights:0}; map[r.campus].followers += Number(r.followers)||0; map[r.campus].connections += Number(r.connections)||0; });
  flowRecs.forEach(r=>{ if(!map[r.campus]) map[r.campus]={campus:r.campus,followers:0,connections:0,posts:0,spotlights:0}; map[r.campus].posts += Number(r.posts)||0; map[r.campus].spotlights += Number(r.spotlights)||0; });
  return Object.values(map).sort((a,b)=>b.followers-a.followers);
}
function reportDeptTotals(months, campus){
  const sortedMonths = (months||[]).slice().sort();
  const lastM = sortedMonths[sortedMonths.length-1];
  const snapshotRecs = STATE.records.filter(r=> r.month===lastM && (campus==='All'||!campus||r.campus===campus));
  const flowRecs = STATE.records.filter(r=> sortedMonths.includes(r.month) && (campus==='All'||!campus||r.campus===campus));
  const map = {};
  snapshotRecs.forEach(r=>{ const k=r.department; if(!map[k]) map[k]={department:k,followers:0,connections:0,posts:0,spotlights:0}; map[k].followers += Number(r.followers)||0; map[k].connections += Number(r.connections)||0; });
  flowRecs.forEach(r=>{ const k=r.department; if(!map[k]) map[k]={department:k,followers:0,connections:0,posts:0,spotlights:0}; map[k].posts += Number(r.posts)||0; map[k].spotlights += Number(r.spotlights)||0; });
  return Object.values(map).sort((a,b)=>b.followers-a.followers);
}
function reportKpis(months, campus, department){
  const sortedMonths = (months||[]).slice().sort();
  const cts = reportCampusTotals(sortedMonths, department).filter(c=> campus==='All'||!campus||c.campus===campus);
  const followers = cts.reduce((a,c)=>a+c.followers,0), connections = cts.reduce((a,c)=>a+c.connections,0);
  const posts = cts.reduce((a,c)=>a+c.posts,0), spotlights = cts.reduce((a,c)=>a+c.spotlights,0);
  const lastM = sortedMonths[sortedMonths.length-1];
  const lastRecs = STATE.records.filter(r=> r.month===lastM && (campus==='All'||!campus||r.campus===campus) && (department==='All'||!department||r.department===department));
  const pagesLive = lastRecs.filter(r=>r.hasPage!==false).length;
  let growth = null;
  if(sortedMonths.length>1){
    const firstM = sortedMonths[0];
    const firstRecs = STATE.records.filter(r=> r.month===firstM && (campus==='All'||!campus||r.campus===campus) && (department==='All'||!department||r.department===department));
    growth = followers - firstRecs.reduce((a,r)=>a+(Number(r.followers)||0),0);
  } else if(lastM){
    const prevRecs = STATE.records.filter(r=> r.month===prevMonthStr(lastM) && (campus==='All'||!campus||r.campus===campus) && (department==='All'||!department||r.department===department));
    if(prevRecs.length) growth = followers - prevRecs.reduce((a,r)=>a+(Number(r.followers)||0),0);
  }
  return {followers, connections, posts, spotlights, growth, pagesLive, total:lastRecs.length};
}

  allHistory.sort((a,b)=> new Date(b.date)-new Date(a.date));
  const newAlumniTotal = allHistory.filter(h=>h.type==='join').reduce((a,h)=>a+(Number(h.count)||0),0);
  const exitedTotal = allHistory.filter(h=>h.type==='exit').reduce((a,h)=>a+(Number(h.count)||0),0);
  return {totalChapters, totalMembers, inactiveMembers, pendingInvites, inactiveChapters, activeAdmins, allHistory, newAlumniTotal, exitedTotal};
}
function reportSessions(months, campus, department){
  return STATE.sessions.filter(s=>{
    const sm = normalizeMonth((s.date||'').slice(0,7));
    return (months||[]).includes(sm) && (campus==='All'||!campus||s.campus===campus) && (department==='All'||!department||s.department===department);
  });
}
function reportFeedbackSummary(months, campus, department){
  const sessions = reportSessions(months, campus, department);
  const ids = new Set(sessions.map(s=>s.id));
  const entries = allFeedbackEntries().filter(e=>ids.has(e.sessionId));
  const recommendPct = entries.length? Math.round((entries.filter(e=>e.recommend).length/entries.length)*100) : null;
  return {entries, overall:avg(entries,'overall'), speaker:avg(entries,'speaker'), content:avg(entries,'content'),
    interaction:avg(entries,'interaction'), relevance:avg(entries,'relevance'), recommendPct};
}

/* =========================================================================
   NOTIFICATIONS (upcoming sessions, pending reports, chapter flags)
========================================================================= */
function computeNotifications(){
  const notes = [];
  const today = new Date();
  STATE.sessions.filter(s=>s.status==='Planned' && s.date).forEach(s=>{
    const d = new Date(s.date);
    const days = Math.round((d-today)/86400000);
    if(days>=0 && days<=14) notes.push({id:'sess-'+s.id, type:'session', urgent:days<=3, text:`Upcoming session: "${s.topic}" with ${s.speaker} in ${days===0?'today':days+' day(s)'} (${s.campus}).`});
  });
  const thisMonthCampuses = new Set(recordsForMonth(STATE.month,'All').map(r=>r.campus));
  CAMPUSES.forEach(c=>{ if(!thisMonthCampuses.has(c)) notes.push({id:'rep-'+c, type:'report', urgent:true, text:`Pending report: no ${monthLabel(STATE.month)} data submitted yet for ${c}.`}); });
  STATE.notifLog.slice().sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,10).forEach(n=> notes.push({id:'log-'+n.id, type:n.type, urgent:false, text:n.text}));
  STATE.helpdesk.filter(h=> h.status==='Escalated').forEach(h=>{
    notes.push({id:'hdesc-'+h.id, type:'helpdesk', urgent:true, text:`Escalated help desk query: ${h.alumnusName} (${h.campus}) — ${h.category}.`});
  });
  STATE.helpdesk.filter(h=> h.followUpDate && (h.status==='Open'||h.status==='In Progress')).forEach(h=>{
    const d = new Date(h.followUpDate);
    const days = Math.round((d-today)/86400000);
    if(days>=0 && days<=3) notes.push({id:'hdfu-'+h.id, type:'helpdesk', urgent:days<=1, text:`Help desk follow-up due for ${h.alumnusName} in ${days===0?'today':days+' day(s)'} (${h.campus}).`});
  });
  return notes;
}
function renderNotifBell(){
  const el = document.getElementById('notifBellWrap');
  if(!el) return;
  const notes = computeNotifications();
  const urgentCount = notes.filter(n=>n.urgent).length;
  el.innerHTML = `
    <button class="btn btn-ghost icon-only" id="notifBellBtn" title="Notifications">🔔${notes.length? `<span class="notif-dot">${notes.length}</span>`:''}</button>
    ${STATE.notifOpen? `
    <div class="dropdown-panel" id="notifPanel">
      <div class="dropdown-head">Notifications ${urgentCount?`<span class="tag tag-none">${urgentCount} urgent</span>`:''}</div>
      ${notes.length? notes.map(n=>`<div class="dropdown-item"><span class="dot ${n.urgent?'dot-danger':'dot-flat'}"></span>${n.text}</div>`).join('') : `<div class="dropdown-item" style="color:var(--ink-faint)">You're all caught up.</div>`}
    </div>`:''}
  `;
  document.getElementById('notifBellBtn').addEventListener('click', (e)=>{ e.stopPropagation(); STATE.notifOpen=!STATE.notifOpen; STATE.searchOpen=false; renderNotifBell(); renderSearchBox(); });
}

/* =========================================================================
   GLOBAL SEARCH
========================================================================= */
function globalSearch(q){
  q = (q||'').trim().toLowerCase();
  if(!q) return [];
  const results = [];
  STATE.sessions.forEach(s=>{
    if([s.speaker,s.topic,s.company,s.designation,s.department,s.campus].filter(Boolean).some(v=>v.toLowerCase().includes(q)))
      results.push({kind:'Alumni / Session', label:`${s.speaker} — ${s.topic}`, sub:`${s.company||''} ${s.designation?'· '+s.designation:''}`, tab:'sessions'});
  });
  STATE.coordinators.forEach(c=>{
    if([c.name,c.department,c.campus,c.email].filter(Boolean).some(v=>v.toLowerCase().includes(q)))
      results.push({kind:'Coordinator', label:c.name, sub:`${c.department} · ${c.campus}`, tab:'coordinators'});
  });
  STATE.helpdesk.forEach(h=>{
    if([h.alumnusName,h.email,h.mobile,h.regNo,h.enrollmentNo,h.campus,h.category].filter(Boolean).some(v=>v.toLowerCase().includes(q)))
      results.push({kind:'Help Desk Visit', label:`${h.alumnusName} — ${h.category}`, sub:`${h.campus} · ${h.status}`, tab:'helpdesk'});
  });
  DEPARTMENTS.forEach(d=>{ if(d.toLowerCase().includes(q)) results.push({kind:'Department', label:d, sub:'Department', tab:'campus'}); });
  const companies = new Set(STATE.sessions.map(s=>s.company).filter(Boolean));
  companies.forEach(co=>{ if(co.toLowerCase().includes(q)) results.push({kind:'Company', label:co, sub:'Alumni employer', tab:'sessions'}); });
  return results.slice(0,10);
}

  const el = document.getElementById('searchBoxWrap');

function renderTicker(){
  const winnerEl = document.getElementById('tickerWinner');
  const track = document.getElementById('tickerTrack');
  const items = topPerformers();
  const winner = items[0];

  winnerEl.innerHTML = winner ? `
    <span class="tw-icon">🏆</span>
    <div class="tw-text">
      <div class="tw-label">Monthly Winner</div>
      <div class="tw-name" title="${winner.label}">${winner.label}</div>
      <div class="tw-val">${winner.kind==='growth'?'+':''}${winner.val.toLocaleString()}${winner.kind==='growth'?' new followers':' followers'}</div>
    </div>` : `
    <span class="tw-icon">🏆</span>
    <div class="tw-text">
      <div class="tw-label">Monthly Winner</div>
      <div class="tw-name">No data yet</div>
    </div>`;

  const perfItems = items.slice(1).map(i=>
    `<span class="ticker-item">${i.kind==='growth'?'📈':'⭐'} <b>${i.label}</b> <span class="up">${i.kind==='growth'?'+':''}${i.val.toLocaleString()}${i.kind==='growth'?' new followers':' followers'}</span></span>`
  );

  const pendingItems = computeNotifications()
    .filter(n=> n.type==='report' || n.urgent)
    .slice(0,6)
    .map(n=> `<span class="ticker-item pending">${n.urgent?'🔴':'🕒'} <b>Pending</b> ${n.text}</span>`);

  const all = [...perfItems, ...pendingItems];
  if(!all.length){ track.innerHTML = `<span class="ticker-item">Everything's on track — no pending items this month.</span>`; return; }
  const html = all.join('');
  track.innerHTML = html + html; // duplicate for seamless loop
}

function renderLeaderboardBlock(el, rows){
  if(!rows.length){ el.innerHTML = `<div class="empty">No data for this month yet.</div>`; return; }

  el.innerHTML = rows.map((r,i)=>`

      <span class="rank-pill ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
      <span class="lb-name" title="${r.name}">${r.name}</span>
      <span class="lb-bar-track"><span class="lb-bar-fill" data-w="${Math.max(4,(r.val/max)*100)}"></span></span>
      <span class="lb-val">${r.val.toLocaleString()}</span>
    </div>`).join('');
  // animate bars in on next frame so the width transition actually plays
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      el.querySelectorAll('.lb-bar-fill').forEach(f=>{ f.style.width = f.dataset.w + '%'; });

  });

  document.getElementById('svMonth').addEventListener('click', ()=>{ STATE.sessionViewMode='month'; render(); });
  document.getElementById('svFeedback').addEventListener('click', ()=>{ STATE.sessionViewMode='feedback'; render(); });
  const body = document.getElementById('sessionBody');

  if(STATE.sessionViewMode==='feedback'){ renderFeedbackAnalytics(body); return; }

  if(!STATE.sessions.length){ body.innerHTML = `<div class="empty"><div class="big">🎤</div>No sessions logged yet.</div>`; return; }

  if(STATE.sessionViewMode==='month'){
    const groups = {};
    STATE.sessions.forEach(s=>{
      const m = (s.date||'').slice(0,7) || 'Unscheduled';
      if(!groups[m]) groups[m] = [];
      groups[m].push(s);
    });
    const monthsSorted = Object.keys(groups).sort();
    body.innerHTML = monthsSorted.map(m=>`
      <div class="section-title-row"><h2>${m==='Unscheduled'?'Unscheduled':monthLabel(m)}</h2><span class="hint">${groups[m].length} session(s)</span></div>

    body.innerHTML = `<div class="grid-cards">${STATE.sessions.slice().sort((a,b)=> new Date(b.date)-new Date(a.date)).map(sessionCardHtml).join('')}</div>`;
  }
}

/* ---------- ALUMNI HELP DESK ---------- */
function hdStatusTag(status){
  const cls = status==='Resolved'?'tag-live':(status==='Escalated'?'tag-danger':(status==='Closed'?'tag-none':'tag-warn'));
  return `<span class="tag ${cls}">${status}</span>`;
}
function hdFilteredRows(){
  let rows = STATE.helpdesk.slice();
  if(STATE.hdStatusFilter!=='All') rows = rows.filter(h=>h.status===STATE.hdStatusFilter);
  if(STATE.hdCampusFilter!=='All') rows = rows.filter(h=>h.campus===STATE.hdCampusFilter);
  if(STATE.hdCategoryFilter!=='All') rows = rows.filter(h=>h.category===STATE.hdCategoryFilter);
  const q = STATE.hdSearch.trim().toLowerCase();
  if(q) rows = rows.filter(h=> [h.alumnusName,h.email,h.mobile,h.regNo,h.enrollmentNo].filter(Boolean).some(v=>v.toLowerCase().includes(q)));
  return rows.sort((a,b)=> new Date(b.visitDate)-new Date(a.visitDate));
}
function helpdeskAnalytics(){
  const rows = STATE.helpdesk;
  const byStatus = {}; HD_STATUSES.forEach(s=> byStatus[s]=0);
  rows.forEach(h=> byStatus[h.status] = (byStatus[h.status]||0)+1);
  const byCampus = {}; rows.forEach(h=> byCampus[h.campus] = (byCampus[h.campus]||0)+1);
  const byCategory = {}; rows.forEach(h=> byCategory[h.category] = (byCategory[h.category]||0)+1);
  const referrals = rows.filter(h=> h.counsellingFor==='Referral' || h.referralStudentName).length;
  const resolvedWithDates = rows.filter(h=> (h.status==='Resolved'||h.status==='Closed') && h.visitDate);
  const avgFeedback = avg(rows.filter(h=>h.feedbackRating!==null && h.feedbackRating!==undefined), 'feedbackRating');
  return { total: rows.length, byStatus, byCampus, byCategory, referrals, resolvedCount: resolvedWithDates.length, avgFeedback };
}
function alumniVisitHistory(entry){
  if(!entry) return [];
  return STATE.helpdesk.filter(h=> h.id!==entry.id && (
    (entry.email && h.email===entry.email) ||
    (entry.mobile && h.mobile===entry.mobile) ||
    (entry.regNo && h.regNo===entry.regNo) ||
    (entry.enrollmentNo && h.enrollmentNo===entry.enrollmentNo)
  )).sort((a,b)=> new Date(b.visitDate)-new Date(a.visitDate));
}

      assignedStaff: document.getElementById('hdStaff').value.trim(), status: document.getElementById('hdStatus').value,

      meetingWith: document.getElementById('hdMeetingWith').value.trim(), meetingDept: document.getElementById('hdMeetingDept').value,
      meetingTime: document.getElementById('hdMeetingTime').value.trim(),
      travelAssistance, accommodationRequested: document.getElementById('hdAccomReq').value==='true',
      accommodationStatus: document.getElementById('hdAccomStatus').value.trim(),
      counsellingFor: document.getElementById('hdCounsellingFor').value,
      referralStudentName: document.getElementById('hdReferralName').value.trim(), referralNotes: document.getElementById('hdReferralNotes').value.trim(),
      campusTourRequested: document.getElementById('hdTour').value==='true',
      documentsShared, attachments, commLog,

function renderCoordGrid(){
  const grid = document.getElementById('coordGrid');
  if(!grid) return;
  const q = STATE.deptSearch.trim().toLowerCase();
  let list = STATE.coordinators;
  if(STATE.coordCampusFilter && STATE.coordCampusFilter!=='All') list = list.filter(c=>c.campus===STATE.coordCampusFilter);
  if(q) list = list.filter(c=> c.name.toLowerCase().includes(q) || c.department.toLowerCase().includes(q) || c.campus.toLowerCase().includes(q));
  if(!list.length){ grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">🧑‍💼</div>No coordinators found.</div>`; return; }
  grid.innerHTML = list.map(c=>{
    const month = STATE.month;
    const prevM = prevMonthStr(month);
    const m = coordMetricsForMonth(c, month);
    const mPrev = coordMetricsForMonth(c, prevM);
    const score = coordEngagementScore(c, month);
    const scorePrev = coordEngagementScore(c, prevM);
    const hasPrev = (c.metricsHistory||[]).some(h=>h.month===prevM);
    const delta = score - scorePrev;
    const scoreClass = score>=70?'score-high':(score>=40?'score-mid':'score-low');
    const achievements = c.achievements||[];
    const growthChip = (cur, prev)=> hasPrev? `<div style="font-size:10.5px;color:${cur>=prev?'var(--success)':'var(--danger)'}">${cur>=prev?'▲':'▼'} ${Math.abs(cur-prev)}</div>` : '';
    return `
    <div class="mini-card" style="grid-column:span 1">
      <h3>${c.name}</h3>
      <div class="meta">${c.department} · ${c.campus}<br>${c.phone||''}${c.phone&&c.email?' · ':''}${c.email||''}</div>
      <span class="score-badge ${scoreClass}">⚡ Engagement Score: ${score}/100</span>
      ${hasPrev? `<span class="kpi-delta ${delta>=0?'pos':'neg'}" style="margin-left:6px">${delta>=0?'▲':'▼'} ${Math.abs(delta)} vs ${monthLabel(prevM)}</span>`:''}
      <div style="font-size:11px;color:var(--ink-faint);margin-top:6px;text-transform:uppercase;letter-spacing:.4px;font-weight:700">Metrics — ${monthLabel(month)}</div>
      <div class="metric-grid">
        <div class="metric-chip"><div class="v">${m.sessionsOrganized||0}</div><div class="l">Sessions</div>${growthChip(m.sessionsOrganized||0,mPrev.sessionsOrganized||0)}</div>
        <div class="metric-chip"><div class="v">${m.linkedinPosts||0}</div><div class="l">LI Posts</div>${growthChip(m.linkedinPosts||0,mPrev.linkedinPosts||0)}</div>
        <div class="metric-chip"><div class="v">${m.alumniOnboarded||0}</div><div class="l">Onboarded</div>${growthChip(m.alumniOnboarded||0,mPrev.alumniOnboarded||0)}</div>
        <div class="metric-chip"><div class="v">${m.eventsCoordinated||0}</div><div class="l">Events</div>${growthChip(m.eventsCoordinated||0,mPrev.eventsCoordinated||0)}</div>
        <div class="metric-chip"><div class="v">${m.responseRate||0}%</div><div class="l">Response</div>${growthChip(m.responseRate||0,mPrev.responseRate||0)}</div>
      </div>
      ${!(c.metricsHistory||[]).some(h=>h.month===month)? `<div class="hint" style="margin-top:4px">No metrics logged for ${monthLabel(month)} yet.</div>`:''}
      ${c.linkedin? `<a class="li-link" href="${c.linkedin}" target="_blank" rel="noopener">in Connect on LinkedIn ↗</a>`:''}
      ${achievements.length? `
        <div style="margin-top:10px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint);font-weight:700">Achievements</div>
        ${achievements.slice().sort((a,b)=> new Date(b.date)-new Date(a.date)).map(a=>`
          <div class="achv-item">
            <div class="achv-type">${a.type}</div>
            <div class="achv-title">${a.title}</div>
            ${a.date? `<div class="achv-date">${a.date}</div>`:''}
            ${a.description? `<div style="font-size:12.5px;color:var(--ink-dim);margin-top:2px">${a.description}</div>`:''}
            ${(a.attachments&&a.attachments.length)? `<div class="pending-chip-row">${a.attachments.map(att=>`<span class="attach-chip">📎 <a href="${att.url}" target="_blank" rel="noopener">${att.name||'Attachment'}</a></span>`).join('')}</div>`:''}
          </div>`).join('')}
      `:''}
      ${STATE.isAdmin? `<div class="row-actions no-print" style="margin-top:10px"><button class="icon-btn" onclick="openCoordModal('${c.id}')">✎</button><button class="icon-btn" onclick="deleteItem('coordinators','${c.id}')">🗑</button></div>`:''}
    </div>
  `;}).join('');
}

/* ---------- TRENDS (6-month compare + annual growth) ---------- */
function last6Months(){
  const months = monthsAvailable();
  const idx = months.indexOf(STATE.month);
  const end = idx>=0? idx : months.length-1;
  const start = Math.max(0, end-5);
  return months.slice(start, end+1);
}
function renderTrends(root){
  if(STATE.campusFilter==='All') STATE.campusFilter = CAMPUSES[0];
  const months = last6Months();
  const rowsByMonth = months.map(m=>{
    const list = recordsForMonth(m, STATE.campusFilter);
    const followers = list.reduce((a,r)=>a+(Number(r.followers)||0),0);
    const connections = list.reduce((a,r)=>a+(Number(r.connections)||0),0);
    const posts = list.reduce((a,r)=>a+(Number(r.posts)||0),0);
    const spotlights = list.reduce((a,r)=>a+(Number(r.spotlights)||0),0);
    return {month:m, followers, connections, posts, spotlights};
  });
  const first = rowsByMonth.find(r=>r.followers>0);
  const latest = rowsByMonth[rowsByMonth.length-1];
  const annualGrowth = (first && latest && first!==latest) ? latest.followers - first.followers : null;
  const annualPct = (first && first.followers>0 && annualGrowth!==null) ? ((annualGrowth/first.followers)*100).toFixed(1) : null;

  root.innerHTML = `
    <div class="filters no-print">
      ${campusSelectHtml('trCampus', false)}
      <span style="color:var(--ink-faint);font-size:12px;">Comparing up to the last 6 available months, ending ${monthLabel(STATE.month)}</span>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Followers — ${monthLabel(latest.month)}</div><div class="kpi-value">${latest.followers.toLocaleString()}</div>
        <div class="kpi-delta flat">${STATE.campusFilter}</div></div>
      <div class="kpi-card"><div class="kpi-label">Growth vs ${first?monthLabel(first.month):'earliest data'}</div>
        <div class="kpi-value">${annualGrowth===null?'—':(annualGrowth>=0?'+':'')+annualGrowth.toLocaleString()}</div>
        <div class="kpi-delta ${annualGrowth===null?'flat':(annualGrowth>=0?'pos':'neg')}">${annualPct===null?'No baseline yet':annualPct+'% change'}</div></div>
    </div>
    <div class="section-title-row"><h2>Past 6 Months — ${STATE.campusFilter}</h2><span class="hint">Followers total, all courses combined</span></div>

/* ---------- EXECUTIVE SUMMARY (management-facing comparisons + auto insights) ---------- */
function generateExecutiveInsights(){
  const parts = [];
  const k = totalKpis(STATE.month);
  const prevK = totalKpis(prevMonthStr(STATE.month));
  if(k.growth!==null){
    parts.push(`Total followers ${k.growth>=0?'grew':'declined'} by ${Math.abs(k.growth).toLocaleString()} (${prevK.followers>0?((k.growth/prevK.followers)*100).toFixed(1):'—'}%) in ${monthLabel(STATE.month)} versus the prior month.`);
  }
  const cts = campusTotals(STATE.month).filter(c=>c.followers>0);
  if(cts.length){
    parts.push(`${cts[0].campus} leads all campuses with ${cts[0].followers.toLocaleString()} followers${cts.length>1?`, ahead of ${cts[cts.length-1].campus} (${cts[cts.length-1].followers.toLocaleString()}).`:'.'}`);
  }
  const dts = deptTotals(STATE.month,'All').filter(d=>d.followers>0);
  if(dts.length) parts.push(`${dts[0].department} is the top-performing department this month with ${dts[0].followers.toLocaleString()} followers.`);
  const sortedCoords = STATE.coordinators.map(c=>({...c, score:coordEngagementScore(c, STATE.month)})).sort((a,b)=>b.score-a.score);
  if(sortedCoords.length) parts.push(`${sortedCoords[0].name} (${sortedCoords[0].campus}) is the most active coordinator this period with an engagement score of ${sortedCoords[0].score}/100.`);
  const heldSessions = STATE.sessions.filter(s=>s.status==='Held').length;
  const plannedSessions = STATE.sessions.filter(s=>s.status==='Planned').length;
  parts.push(`${heldSessions} alumni session(s) have been held to date, with ${plannedSessions} more planned.`);
  const chAn = chapterAnalytics();
  if(chAn.totalChapters) parts.push(`WhatsApp chapters cover ${chAn.totalChapters} region(s) with ${chAn.totalMembers.toLocaleString()} active members; ${chAn.inactiveChapters} chapter(s) are currently inactive and may need re-engagement.`);
  const missing = CAMPUSES.filter(c=>!recordsForMonth(STATE.month,'All').some(r=>r.campus===c));
  if(missing.length) parts.push(`Action needed: ${missing.join(', ')} ${missing.length>1?'have':'has'} not yet submitted ${monthLabel(STATE.month)} data.`);
  return parts;
}

        </div>

        <div class="section-title-row" style="margin-top:14px"><h2 style="font-size:15px">Activity History — Audit Trail</h2></div>
        <div id="histListWrap"></div>
        <div class="field-row" style="margin-top:8px">
          <div class="field"><label>Type</label><select id="histType"><option value="join">Alumni Added</option><option value="exit">Alumni Removed</option><option value="transfer">Alumni Transferred</option></select></div>
          <div class="field"><label>Date</label><input type="date" id="histDate"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Count</label><input type="number" id="histCount" value="1"></div>
          <div class="field"><label>Added / Removed By</label><input id="histBy" placeholder="e.g. Priya Nair"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Previous Chapter (if moved)</label><input id="histPrevChapter" placeholder="Optional"></div>
          <div class="field"><label>New Chapter (if transferred)</label><input id="histNewChapter" placeholder="Optional"></div>
        </div>
        <div class="field"><label>Reason for Addition / Removal</label><input id="histReason" placeholder="e.g. Inactive for 6+ months"></div>
        <div class="field"><label>Note (optional)</label><input id="histNote" placeholder="e.g. Referral drive"></div>
        <button class="btn btn-ghost btn-sm" id="histAdd" type="button">+ Log Entry</button>

        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-gold" id="cSave">${c?'Save':'Add Chapter'}</button>
        </div>
      </div>
    </div>`;
  renderHist();
  document.getElementById('histAdd').addEventListener('click', ()=>{
    const date = document.getElementById('histDate').value || currentMonthStr()+'-01';
    const type = document.getElementById('histType').value;
    const count = Number(document.getElementById('histCount').value)||0;
    const note = document.getElementById('histNote').value.trim();
    const performedBy = document.getElementById('histBy').value.trim();
    const reason = document.getElementById('histReason').value.trim();
    const previousChapter = document.getElementById('histPrevChapter').value.trim();
    const newChapter = document.getElementById('histNewChapter').value.trim();
    if(!count){ toast('Enter a count greater than 0.', 'err'); return; }
    if(type==='exit' && !reason){ toast('Please provide a reason for removal.', 'err'); return; }
    history.push({date, type, count, note, performedBy, reason, previousChapter, newChapter});
    STATE.notifLog.unshift({id:uid(), date, type: type==='join'?'chapter_join':(type==='transfer'?'chapter_transfer':'chapter_exit'),
      text:`${count} alumni ${type==='join'?'added to':(type==='transfer'?'transferred within':'removed from')} the ${document.getElementById('cRegion').value.trim()||'chapter'} WhatsApp chapter${reason?` (${reason})`:''}.`});
    document.getElementById('histCount').value='1'; document.getElementById('histNote').value=''; document.getElementById('histDate').value='';
    document.getElementById('histBy').value=''; document.getElementById('histReason').value=''; document.getElementById('histPrevChapter').value=''; document.getElementById('histNewChapter').value='';
    renderHist();
    toast('Activity logged and flagged in Notifications.');
  });
  document.getElementById('cSave').addEventListener('click', async ()=>{
    const data = { region:document.getElementById('cRegion').value.trim(), campus:document.getElementById('cCampus').value,
      department:document.getElementById('cDept').value, admin:document.getElementById('cAdmin').value.trim(), adminPhone:document.getElementById('cAdminPhone').value.trim(),
      activeMembers:Number(document.getElementById('cMembers').value)||0, inactiveMembers:Number(document.getElementById('cInactive').value)||0,
      pendingInvites:Number(document.getElementById('cPending').value)||0,
      active:document.getElementById('cActive').value==='true',
      link:document.getElementById('cLink').value.trim(), history };
    if(!data.region){ toast('Region is required.', 'err'); return; }
    if(c){ Object.assign(c,data); toast('Chapter updated.'); } else { STATE.chapters.push({id:uid(),...data}); toast('Chapter added.'); }
    closeModal(); render(); await pushToBackend();
  });
}

function openAlumniTransferModal(alumniId){

function openCoordModal(id){
  const c = id? STATE.coordinators.find(x=>x.id===id): null;
  const m = document.getElementById('modalRoot');
  let metricsHistory = c? JSON.parse(JSON.stringify(c.metricsHistory||[])) : [];
  let activeMonth = STATE.month;
  let achievements = c? JSON.parse(JSON.stringify(c.achievements||[])) : [];
  let pendingAttachments = [];

  const metricsForMonth = (mo)=> metricsHistory.find(x=>x.month===mo) || {sessionsOrganized:0,linkedinPosts:0,alumniOnboarded:0,eventsCoordinated:0,responseRate:0};
  const readMetricFields = ()=>({
    sessionsOrganized:Number(document.getElementById('mtSessions').value)||0,
    linkedinPosts:Number(document.getElementById('mtPosts').value)||0,
    alumniOnboarded:Number(document.getElementById('mtOnboarded').value)||0,
    eventsCoordinated:Number(document.getElementById('mtEvents').value)||0,
    responseRate:Number(document.getElementById('mtResponse').value)||0,
  });
  // Saves whatever is currently in the metric fields into metricsHistory for
  // whichever month is active, so switching months (or hitting Save) never
  // loses unsaved edits for the month you were just looking at.
  const commitCurrentMonth = ()=>{
    const vals = readMetricFields();
    const hasAny = vals.sessionsOrganized||vals.linkedinPosts||vals.alumniOnboarded||vals.eventsCoordinated||vals.responseRate;
    const idx = metricsHistory.findIndex(x=>x.month===activeMonth);
    if(idx>-1) metricsHistory[idx] = {month:activeMonth, ...vals};
    else if(hasAny) metricsHistory.push({month:activeMonth, ...vals});
  };
  const loadMonthFields = (mo)=>{
    const v = metricsForMonth(mo);
    document.getElementById('mtSessions').value = v.sessionsOrganized||0;
    document.getElementById('mtPosts').value = v.linkedinPosts||0;
    document.getElementById('mtOnboarded').value = v.alumniOnboarded||0;
    document.getElementById('mtEvents').value = v.eventsCoordinated||0;
    document.getElementById('mtResponse').value = v.responseRate||0;
  };
  const renderMetricsHistList = ()=>{
    const wrap = document.getElementById('metricsHistWrap');
    if(!wrap) return;
    const sorted = metricsHistory.slice().sort((a,b)=> b.month.localeCompare(a.month));
    wrap.innerHTML = sorted.length? sorted.map(h=>`
      <div class="achv-item" style="display:flex;justify-content:space-between;gap:8px;align-items:center">
        <span style="font-size:12.5px"><b>${monthLabel(h.month)}</b>${h.month===activeMonth?' <span class="tag tag-live" style="font-size:10px">editing</span>':''} — ${h.sessionsOrganized||0} sessions · ${h.linkedinPosts||0} posts · ${h.alumniOnboarded||0} onboarded · ${h.eventsCoordinated||0} events · ${h.responseRate||0}% response</span>
        <span style="display:flex;gap:6px;flex-shrink:0">
          <button class="icon-btn" id="viewMo-${h.month}" title="Edit this month">✎</button>
          <button class="icon-btn" id="rmMo-${h.month}" title="Delete this month">🗑</button>
        </span>
      </div>`).join('') : `<div class="empty" style="padding:14px">No monthly metrics logged yet.</div>`;
    sorted.forEach(h=>{
      const vb=document.getElementById('viewMo-'+h.month);
      if(vb) vb.addEventListener('click', ()=>{ commitCurrentMonth(); activeMonth=h.month; document.getElementById('metricMonth').value=h.month; loadMonthFields(h.month); renderMetricsHistList(); });
      const rb=document.getElementById('rmMo-'+h.month);
      if(rb) rb.addEventListener('click', ()=>{ metricsHistory = metricsHistory.filter(x=>x.month!==h.month); if(activeMonth===h.month) loadMonthFields(activeMonth); renderMetricsHistList(); });
    });
  };
  const renderAchvList = ()=>{
    const wrap = document.getElementById('achvListWrap');
    if(!wrap) return;
    wrap.innerHTML = achievements.length? achievements.map((a,i)=>`
      <div class="achv-item" style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
        <div><div class="achv-type">${a.type}</div><div class="achv-title">${a.title}</div><div class="achv-date">${a.date||''}</div>${a.description?`<div style="font-size:12px;color:var(--ink-dim)">${a.description}</div>`:''}
        ${(a.attachments&&a.attachments.length)? `<div class="pending-chip-row">${a.attachments.map(att=>`<span class="attach-chip">📎 <a href="${att.url}" target="_blank" rel="noopener">${att.name||'Attachment'}</a></span>`).join('')}</div>`:''}
        </div>
        <button class="icon-btn" data-i="${i}" id="rmAchv${i}">\ud83d\uddd1</button>
      </div>`).join('') : `<div class="empty" style="padding:14px">No achievements logged yet.</div>`;
    achievements.forEach((a,i)=>{ const b=document.getElementById('rmAchv'+i); if(b) b.addEventListener('click', ()=>{ achievements.splice(i,1); renderAchvList(); }); });
  };
  const renderPendingAttachments = ()=>{
    const wrap = document.getElementById('pendingAttachWrap');
    if(!wrap) return;
    wrap.innerHTML = pendingAttachments.length? pendingAttachments.map((att,i)=>`<span class="attach-chip">📎 ${att.name} <button type="button" id="rmPendAtt${i}" style="border:none;background:none;cursor:pointer;color:var(--danger)">✕</button></span>`).join('') : '';
    pendingAttachments.forEach((att,i)=>{ const b=document.getElementById('rmPendAtt'+i); if(b) b.addEventListener('click', ()=>{ pendingAttachments.splice(i,1); renderPendingAttachments(); }); });
  };
  m.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:620px">
        <h2>${c?'Edit Coordinator':'Add Coordinator'}</h2>
        <div class="field-row">
          <div class="field"><label>Name</label><input id="pName" value="${c?c.name:''}"></div>
          <div class="field"><label>Department</label><select id="pDept">${DEPARTMENTS.map(d=>`<option ${c&&c.department===d?'selected':''}>${d}</option>`).join('')}</select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Campus</label><select id="pCampus">${CAMPUSES.map(x=>`<option ${c&&c.campus===x?'selected':''}>${x}</option>`).join('')}</select></div>
          <div class="field"><label>Phone</label><input id="pPhone" value="${c?c.phone||'':''}"></div>
        </div>
        <div class="field"><label>Email</label><input id="pEmail" value="${c?c.email||'':''}"></div>
        <div class="field"><label>LinkedIn Profile</label><input id="pLinkedin" value="${c?c.linkedin||'':''}" placeholder="https://linkedin.com/in/\u2026"></div>

        <div class="section-title-row" style="margin-top:16px"><h2 style="font-size:15px">Performance Metrics</h2><span class="hint">Tracked month by month — pick a month to view/edit it</span></div>
        <div class="field"><label>Month</label><input type="month" id="metricMonth" value="${activeMonth}"></div>
        <div class="field-row">
          <div class="field"><label>Alumni Sessions Organized</label><input type="number" id="mtSessions" value="0"></div>
          <div class="field"><label>LinkedIn Posts Contributed</label><input type="number" id="mtPosts" value="0"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Alumni Onboarded</label><input type="number" id="mtOnboarded" value="0"></div>
          <div class="field"><label>Events Coordinated</label><input type="number" id="mtEvents" value="0"></div>
        </div>
        <div class="field"><label>Response Rate (%)</label><input type="number" id="mtResponse" min="0" max="100" value="0"></div>
        <div id="metricsHistWrap" style="margin-top:8px"></div>

        <div class="section-title-row" style="margin-top:16px"><h2 style="font-size:15px">Achievements</h2></div>
        <div id="achvListWrap"></div>
        <div class="field-row" style="margin-top:8px">
          <div class="field"><label>Type</label><select id="achvType">${ACHIEVEMENT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>

// Maps internal alumniWapp field keys to the exact column headers used in the
// "Alumni in Wapp" sheet, so export/import round-trips against the same
// spreadsheet layout the alumni relations team already maintains.
const ALUMNI_WAPP_FIELDS = [
  {key:'name', header:'Name'},
  {key:'email', header:'Email Address'},
  {key:'leavingYear', header:'Leaving Year'},
  {key:'courseDept', header:'Course/Department'},
  {key:'branchDesig', header:'Branch/Designation'},
  {key:'campus', header:'Campus'},
  {key:'city', header:'City'},
  {key:'linkedin', header:'LinkedIn'},
  {key:'company', header:'Company'},
  {key:'designation', header:'Designation'},
  {key:'mobile', header:'Mobile Number'},
  {key:'chapter', header:'Chapter'},
];
function alumniWappToExcelRow(a){
  const row = {};
  ALUMNI_WAPP_FIELDS.forEach(f=> row[f.header] = a[f.key] ?? '');
  return row;
}
function excelRowToAlumniWapp(row){
  // Case/whitespace-tolerant lookup so a manually-maintained sheet with
  // slightly different header casing/spacing still imports correctly.
  const keys = Object.keys(row);
  const findVal = (header)=>{
    const norm = s => String(s).trim().toLowerCase();
    const k = keys.find(k=>norm(k)===norm(header));
    return k!==undefined ? row[k] : '';
  };
  const out = {};
  ALUMNI_WAPP_FIELDS.forEach(f=> out[f.key] = String(findVal(f.header) ?? '').trim());
  return out;
}
function flattenForExcel(list, nestedFields){
  return (list||[]).map(item=>{
    const copy = {...item};
    nestedFields.forEach(f=>{ copy[f] = JSON.stringify(item[f]||[]); });
    return copy;
  });
}
function unflattenFromExcel(list, nestedFields){
  return (list||[]).map(item=>{
    const copy = {...item};
    nestedFields.forEach(f=>{
      if(typeof copy[f] === 'string'){
        try{ copy[f] = JSON.parse(copy[f]); }catch(e){ copy[f] = []; }
      } else if(!Array.isArray(copy[f])){ copy[f] = []; }
    });
    return copy;
  });
}
function exportExcel(){
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(STATE.records), "Records");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(flattenForExcel(STATE.sessions, ['documents','feedbackEntries'])), "Sessions");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(flattenForExcel(STATE.chapters, ['history'])), "WhatsApp Chapters");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(flattenForExcel(STATE.coordinators, ['achievements','metricsHistory'])), "Coordinators");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(STATE.alumniWapp.map(alumniWappToExcelRow)), "Alumni in Wapp");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(flattenForExcel(STATE.helpdesk, ['travelAssistance','documentsShared','attachments','commLog'])), "Alumni Help Desk");
  XLSX.writeFile(wb, `GEHU_LinkedIn_CommandCenter_${STATE.month}.xlsx`);
  toast('Excel export ready.');
}
function importExcel(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const getSheet = (name)=> wb.Sheets[name]? XLSX.utils.sheet_to_json(wb.Sheets[name]) : null;
      const records = getSheet("Records");
      if(records){ records.forEach(r=>{ if(!r.id) r.id=uid(); r.followers=Number(r.followers)||0; r.connections=Number(r.connections)||0; r.posts=Number(r.posts)||0; r.spotlights=Number(r.spotlights)||0; }); normalizeRecordMonths(records); STATE.records = records; }
      let sessions = getSheet("Sessions"); if(sessions){ sessions.forEach(s=>{ if(!s.id) s.id=uid(); }); STATE.sessions = unflattenFromExcel(sessions, ['documents','feedbackEntries']); }
      let chapters = getSheet("WhatsApp Chapters"); if(chapters){ chapters.forEach(c=>{ if(!c.id) c.id=uid(); }); STATE.chapters = unflattenFromExcel(chapters, ['history']); }
      let coordinators = getSheet("Coordinators"); if(coordinators){ coordinators.forEach(c=>{ if(!c.id) c.id=uid(); }); STATE.coordinators = unflattenFromExcel(coordinators, ['achievements','metricsHistory']); }
      let alumniWapp = getSheet("Alumni in Wapp"); if(alumniWapp){ STATE.alumniWapp = alumniWapp.map(row=>({id:uid(), ...excelRowToAlumniWapp(row)})); }
      let helpdesk = getSheet("Alumni Help Desk"); if(helpdesk){ helpdesk.forEach(hd=>{ if(!hd.id) hd.id=uid(); }); STATE.helpdesk = unflattenFromExcel(helpdesk, ['travelAssistance','documentsShared','attachments','commLog']); }
      toast('Excel import complete.');
      render(); pushToBackend();
    }catch(err){ console.error(err); toast('Import failed — check the file format.', 'err'); }
  };
  reader.readAsArrayBuffer(file);
}
