function generateCustomReport(sectionIds, orientation, filters){
  filters = filters || {};
  const campus = filters.campus || 'All';
  const department = filters.department || 'All';
  const months = (filters.months && filters.months.length) ? filters.months : [STATE.month];
  const periodLabel = filters.periodLabel || monthLabel(STATE.month);
  const reportType = filters.reportType || 'summary';
  const isDetailed = reportType === 'detailed';
  const campusLabel = (REPORT_CAMPUS_OPTIONS.find(o=>o.id===campus)||{label:campus}).label;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF(orientation==='landscape'?'l':'p', 'mm', 'a4');
  const navyRGB = [16,28,51];
  const pageW = doc.internal.pageSize.getWidth();

  // Cover page
  doc.setFontSize(20); doc.setTextColor(...navyRGB); doc.setFont(undefined,'bold');
  doc.text(INSTITUTE_NAME, 14, 40);
  doc.setFontSize(14); doc.text('LinkedIn Command Center — Custom Report', 14, 49);
  doc.setFont(undefined,'normal'); doc.setFontSize(10); doc.setTextColor(100);
  doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 60);
  doc.text(`Campus: ${campusLabel}`, 14, 66);
  doc.text(`Department: ${department==='All'?'All Departments':department}`, 14, 72);
  doc.text(`Reporting Period: ${periodLabel}`, 14, 78);
  doc.text(`Report Type: ${isDetailed?'Detailed':'Summary'}`, 14, 84);
  const sectionLines = doc.splitTextToSize(`Sections included: ${sectionIds.map(id=>(REPORT_SECTIONS.find(s=>s.id===id)||{label:id}).label).join(', ')}`, pageW-28);
  doc.text(sectionLines, 14, 92);

  sectionIds.forEach(id=>{
    doc.addPage();
    let y = 20;
    const label = (REPORT_SECTIONS.find(s=>s.id===id)||{label:id}).label;
    doc.setFontSize(14); doc.setTextColor(...navyRGB); doc.setFont(undefined,'bold');
    doc.text(label, 14, y);
    doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(120);
    doc.text(`${periodLabel} · ${campusLabel} · ${department==='All'?'All Departments':department} · ${INSTITUTE_NAME}`, 14, y+6);
    y += 14;

    if(id==='dashboard'){
      const k = reportKpis(months, campus, department);
      doc.autoTable({ startY:y, head:[['Metric','Value']], body:[
        ['Total Followers', k.followers.toLocaleString()],
        ['Total Connections', k.connections.toLocaleString()],
        ['Posts in Period', k.posts],
        ['Spotlights', k.spotlights],
        ['Pages Live', `${k.pagesLive}/${k.total}`],
        ['Growth vs Prior Period', k.growth===null?'—':k.growth.toLocaleString()],
      ], theme:'grid', headStyles:{fillColor:navyRGB} });
    }
    else if(id==='departments'){
      let dts = reportDeptTotals(months, campus);
      if(department!=='All') dts = dts.filter(d=>d.department===department);
      doc.autoTable({ startY:y, head:[['Department','Followers','Connections','Posts','Spotlights']],
        body:dts.map(d=>[d.department, d.followers, d.connections, d.posts, d.spotlights]),
        theme:'grid', headStyles:{fillColor:navyRGB} });
    }
    else if(id==='coordinators'){
      const coords = reportCoordinators(campus, department);
      doc.autoTable({ startY:y, head:[['Coordinator','Campus / Dept','Sessions','LI Posts','Onboarded','Events','Response %','Score']],
        body: coords.length? coords.map(c=>{ const reportMonth = months[months.length-1] || STATE.month; const mt=coordMetricsForMonth(c, reportMonth); return [c.name, `${c.campus} / ${c.department}`, mt.sessionsOrganized||0, mt.linkedinPosts||0, mt.alumniOnboarded||0, mt.eventsCoordinated||0, (mt.responseRate||0)+'%', coordEngagementScore(c, reportMonth)]; }) : [['No coordinators match this filter','','','','','','','']],
        theme:'grid', headStyles:{fillColor:navyRGB}, styles:{fontSize:8} });
      if(isDetailed){
        const withAchv = coords.filter(c=>(c.achievements||[]).length);
        if(withAchv.length){
          const y2 = doc.lastAutoTable.finalY + 10;
          doc.setFontSize(11); doc.setTextColor(...navyRGB); doc.text('Coordinator Achievements', 14, y2);
          doc.autoTable({ startY:y2+4, head:[['Coordinator','Type','Title','Date']],
            body: withAchv.flatMap(c=> c.achievements.map(a=>[c.name, a.type, a.title, a.date||''])),
            theme:'grid', headStyles:{fillColor:navyRGB}, styles:{fontSize:8} });
        }
      }
    }
    else if(id==='sessions'){
      const sessions = reportSessions(months, campus, department);
      doc.autoTable({ startY:y, head: isDetailed? [['Alumni','Topic','Date','Campus','Company','Attendance','Status']] : [['Alumni','Topic','Date','Campus','Company','Status']],
        body: sessions.length? sessions.map(s=> isDetailed? [s.speaker, s.topic, s.date, s.campus, s.company||'', s.attendance||0, s.status] : [s.speaker, s.topic, s.date, s.campus, s.company||'', s.status])
          : [isDetailed? ['No sessions in this period/filter','','','','','',''] : ['No sessions in this period/filter','','','','','']],
        theme:'grid', headStyles:{fillColor:navyRGB}, styles:{fontSize:8} });
    }
    else if(id==='linkedin'){
      let cts = reportCampusTotals(months, department);
      if(campus!=='All') cts = cts.filter(c=>c.campus===campus);
      doc.autoTable({ startY:y, head:[['Campus','Followers','Connections','Posts','Spotlights']],
        body:cts.map(c=>[c.campus, c.followers, c.connections, c.posts, c.spotlights]),
        theme:'grid', headStyles:{fillColor:navyRGB} });
      const trendMonths = months.length>1? months.slice().sort() : last6Months();
      const y2 = doc.lastAutoTable.finalY + 10;
      doc.setFontSize(11); doc.setTextColor(...navyRGB); doc.text(`${months.length>1?'Period':'6-Month'} Trend — ${campusLabel}`, 14, y2);
      doc.autoTable({ startY:y2+4, head:[['Month','Followers']], body: trendMonths.map(mm=>{ const list=recordsForMonth(mm, campus==='All'?'All':campus).filter(r=>department==='All'||r.department===department); return [monthLabel(mm), list.reduce((a,r)=>a+(Number(r.followers)||0),0)]; }), theme:'grid', headStyles:{fillColor:navyRGB} });
    }
    else if(id==='whatsapp'){
      const a = reportChapterAnalytics(campus, department);
      doc.autoTable({ startY:y, head:[['Metric','Value']], body:[
        ['Total Chapters', a.totalChapters], ['Total Members', a.totalMembers], ['Inactive Members', a.inactiveMembers], ['Pending Invitations', a.pendingInvites],
        ['Inactive Chapters', a.inactiveChapters], ['Chapter Administrators', a.activeAdmins],
        ['New Members Added (all-time)', a.newAlumniTotal], ['Members Exited (all-time)', a.exitedTotal],
      ], theme:'grid', headStyles:{fillColor:navyRGB} });
      if(isDetailed && a.allHistory.length){
        const y2 = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(11); doc.setTextColor(...navyRGB); doc.text('Activity History', 14, y2);
        doc.autoTable({ startY:y2+4, head:[['Date','Chapter','Type','Count','By','Reason']],
          body:a.allHistory.slice(0,40).map(h=>[h.date, h.chapter, h.type, h.count, h.performedBy||'—', h.reason||'—']),
          theme:'grid', headStyles:{fillColor:navyRGB}, styles:{fontSize:8} });
      }
    }
    else if(id==='feedback'){
      const f = reportFeedbackSummary(months, campus, department);
      const fmt = n=> n===null?'—':n.toFixed(1);
      doc.autoTable({ startY:y, head:[['Metric','Value']], body:[
        ['Overall Session Rating', fmt(f.overall)+'/5'], ['Speaker Rating', fmt(f.speaker)+'/5'], ['Content Quality', fmt(f.content)+'/5'],
        ['Interaction Level', fmt(f.interaction)+'/5'], ['Relevance to Students', fmt(f.relevance)+'/5'],
        ['Would Recommend', f.recommendPct===null?'—':f.recommendPct+'%'],
      ], theme:'grid', headStyles:{fillColor:navyRGB} });
      if(!isDetailed){
        // summary-only narrative kept brief
      } else if(f.entries.length){
        const y2 = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(9); doc.setTextColor(80);
        const lines = doc.splitTextToSize(`${f.entries.length} feedback response(s) recorded for this filter.`, pageW-28);
        doc.text(lines, 14, y2);
      }
    }
    else if(id==='charts'){
      let dts = reportDeptTotals(months, campus).slice(0,8);
      if(department!=='All') dts = dts.filter(d=>d.department===department);
      doc.setFontSize(11); doc.setTextColor(...navyRGB); doc.text('Department Followers — Bar Chart', 14, y);
      let by = y+10;
      const maxVal = Math.max(...dts.map(d=>d.followers), 1);
      const chartWidth = pageW-70;
      dts.forEach(d=>{
        doc.setFontSize(8); doc.setTextColor(60);
        doc.text(d.department, 14, by+4);
        const w = Math.max(2, (d.followers/maxVal)*chartWidth);
        doc.setFillColor(214,167,42);
        doc.rect(50, by, w, 5, 'F');
        doc.text(String(d.followers), 52+w, by+4);
        by += 9;
      });
    }
    else if(id==='rankings'){
      let cts = reportCampusTotals(months, department);
      if(campus!=='All') cts = cts.filter(c=>c.campus===campus);
      doc.autoTable({ startY:y, head:[['Rank','Campus','Followers']], body:cts.map((c,i)=>[i+1,c.campus,c.followers]), theme:'grid', headStyles:{fillColor:navyRGB} });
      const y2 = doc.lastAutoTable.finalY+10;
      let dts = reportDeptTotals(months, campus);
      if(department!=='All') dts = dts.filter(d=>d.department===department);
      doc.setFontSize(11); doc.setTextColor(...navyRGB); doc.text('Department Ranking', 14, y2);
      doc.autoTable({ startY:y2+4, head:[['Rank','Department','Followers']], body:dts.map((d,i)=>[i+1,d.department,d.followers]), theme:'grid', headStyles:{fillColor:navyRGB} });
    }
    else if(id==='executive'){
      const insights = generateExecutiveInsights();
      doc.setFontSize(9); doc.setTextColor(60);
      let by = y;
      insights.forEach(line=>{
        const lines = doc.splitTextToSize('• '+line, pageW-28);
        doc.text(lines, 14, by);
        by += lines.length*5 + 3;
      });
    }
  });

  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`Page ${i} of ${pageCount}`, doc.internal.pageSize.getWidth()-30, doc.internal.pageSize.getHeight()-8);
  }
  doc.save(`GEHU_Custom_Report_${months[months.length-1]||STATE.month}.pdf`);
  toast('Custom report downloaded.');
}

/* =========================================================================
   INIT
========================================================================= */
async function init(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.activeTab = btn.dataset.tab; STATE.deptSearch=''; render(); });
  });
  document.getElementById('btnPin').addEventListener('click', openPinModal);
  document.getElementById('btnPdf').addEventListener('click', openReportModal);
  document.getElementById('btnXlsxExport').addEventListener('click', exportExcel);
  document.getElementById('btnXlsxImport').addEventListener('click', ()=>document.getElementById('xlsxFileInput').click());
  document.getElementById('xlsxFileInput').addEventListener('change', (e)=>{ if(e.target.files[0]) importExcel(e.target.files[0]); e.target.value=''; });

  // Keep the loading bar visible (instead of flashing dummy data) until the
  // real sync attempt resolves one way or the other.
  const overlay = document.getElementById('loadingOverlay');
  const sub = document.getElementById('loadingSub');
  const synced = await pullFromBackend();
  if(!synced){
    if(sub) sub.textContent = 'Live sheet unavailable — loading local demo data';
    seedData();
  } else {
    if(sub) sub.textContent = 'Synced — loading dashboard';
  }
  render();
  if(synced) toast('Synced with live Google Sheet.');
  if(overlay){ overlay.classList.add('hidden'); setTimeout(()=>overlay.remove(), 400); }
}
init();
</script>
